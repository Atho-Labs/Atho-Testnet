edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
atho-core = { path = "../crates/atho-core" }
atho-p2p = { path = "../crates/atho-p2p" }

[[bin]]
name = "p2p_frame_decode"

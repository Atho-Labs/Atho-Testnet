doc = false
bench = false

[[bin]]
name = "p2p_message_roundtrip"
path = "fuzz_targets/p2p_message_roundtrip.rs"
test = false
doc = false
bench = false

[[bin]]
name = "tx_witness_parse"
path = "fuzz_targets/tx_witness_parse.rs"
test = false
doc = false
bench = false

[workspace]
